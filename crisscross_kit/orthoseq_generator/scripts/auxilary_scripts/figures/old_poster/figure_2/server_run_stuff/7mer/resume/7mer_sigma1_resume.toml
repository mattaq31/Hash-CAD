[compute]
enabled = false

[compare]
enabled = true
pkl_paths = ["results/short_seq_7mer_sigma1_subset.pkl"]

# Leave empty to compute dynamically from max_on
# offtarget_limits = [-8.0, -7.5]

offtarget_step = 0.1
target_conflict_prob = 0.5
max_steps = 2000
random_seed = 41
num_runs = 5
num_vertices_to_remove = 0
max_iterations = 300
limit = 1e9
show_progress = false

[plot]
enabled = false

[output]
dir = "results"
