[run]
lengths = [8,9,10,12,14,16,18,20,25]
fivep_exts = [""]
threep_ext = ""
unwanted_substrings = ["GGGG", "CCCC"]
apply_unwanted_to = "full"
random_seed = 41

[nupack]
material = "dna"
celsius = 37.0
sodium = 0.05
magnesium = 0.025

[prep]
name = "batch_x_____"
sample_size = 2000
range_sigma = 1.0

[physics]
strand_concentration_nM = 1000.0
offtarget_target_bound_fractions = [0.01]
self_target_unpaired_fraction = 0.2

[budget]
total_nupack_budgets = [10_000_000]

[naive]
progress_every = 250
duplicate_streak_limit = 1000000
min_progress_interval_s = 1.0

[hybrid]
initial_fresh_pair_counts = [250,450,900]
prune_fraction = 0.2
vc_max_iterations = 1000

[server]
module_load = "conda/miniforge3/24.11.3-0"
conda_env = "cc"
project_root = "Hash-CAD"
partition = "medium"
email = ""
mp_start = "spawn"

[server_naive]
cpus = 2
memory = "16G"
time = "5-00:00:00"

[server_hybrid]
cpus = 3
memory = "16G"
time = "5-00:00:00"
